<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Handschrift zu Text Konverter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">
        <h2>Handschrift erkennen ✍️</h2>
        <p>Lade ein Bild oder ein PDF hoch.</p>

        <input type="file" id="fileInput" accept="image/*, application/pdf">
        <br>

        <input type="text" id="customFileName" placeholder="Eigener Dateiname (optional)"
            style="margin: 10px 0; padding: 10px; width: 80%; border: 1px solid #ccc; border-radius: 5px;">
        <br>

        <button onclick="uploadImage()">Text erkennen & Konvertieren</button>
        <div id="status"></div>

        <div id="result-box">
            <h3>Erkannter Text:</h3>
            <div class="text-output" id="textOutput"></div>

            <h3>Downloads:</h3>
            <a id="pdfDownload" href="#" class="download-btn" download>📄 PDF Herunterladen</a>
            <a id="wordDownload" href="#" class="download-btn word" download>📝 Word Herunterladen</a>

            <h3 style="margin-top: 30px;">Dokumenten-Vorschau:</h3>
            <iframe id="pdfPreview" src=""
                style="width: 100%; height: 400px; border: 1px solid #ccc; border-radius: 5px;"></iframe>
        </div>
    </div>

    <script>
        async function uploadImage() {
            const fileInput = document.getElementById('fileInput');
            const customFileName = document.getElementById('customFileName').value;
            const statusText = document.getElementById('status');
            const resultBox = document.getElementById('result-box');

            if (fileInput.files.length === 0) {
                alert("Bitte wähle zuerst eine Datei aus!");
                return;
            }

            statusText.innerText = "Verarbeite Datei... Bitte warten ⏳";
            resultBox.style.display = "none";

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            if (customFileName.trim() !== "") {
                formData.append("custom_filename", customFileName);
            }

            try {
                const response = await fetch("/upload/", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                document.getElementById('textOutput').innerText = data.erkannter_text;
                document.getElementById('pdfDownload').href = "/" + data.erstelltes_pdf;
                document.getElementById('wordDownload').href = "/" + data.erstelltes_word;
                document.getElementById('pdfPreview').src = "/" + data.erstelltes_pdf;

                statusText.innerText = "Erfolgreich konvertiert! 🎉";
                resultBox.style.display = "block";

            } catch (error) {
                statusText.innerText = "Fehler beim Upload: " + error;
            }
        }
    </script>
</body>

</html>
